<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4.13/lib/themes/vue.css"
    />
  </head>
  <body>
    <div id="app">Please wait...</div>
    <script>
      window.$docsify = {
        repo: 'RedElectricity/event_base',
        auto2top: true,
        nativeEmoji: true,
        coverpage: true,
        loadSidebar: true,
        subMaxLevel: 3,
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: 'Search docs...',
          noData: 'No results!'
        },
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md'
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30/components/prism-rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30/components/prism-toml.min.js"></script>
  </body>
</html>
